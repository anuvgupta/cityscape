<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Cityscape Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #de5b68;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
    }
    #stage { position: fixed; inset: 0; }
    canvas { display: block; width: 100%; height: 100%; touch-action: none; }

    #info {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 16px);
      left: calc(env(safe-area-inset-left, 0px) + 16px);
      z-index: 10;
      padding: 10px 14px;
      background: rgba(15, 17, 28, 0.55);
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      color: rgba(220, 225, 240, 0.85);
      font-size: 11px;
      letter-spacing: 0.04em;
      line-height: 1.5;
    }
    #info .title {
      color: #d4ff5f;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 10px;
      margin-bottom: 2px;
    }

    #generate-controls {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 16px);
      right: calc(env(safe-area-inset-right, 0px) + 16px);
      z-index: 10;
      padding: 10px 14px;
      background: rgba(15, 17, 28, 0.55);
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      width: 200px;
    }
    #generate-controls .header {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #generate-btn {
      flex: 1;
      width: auto;
      height: auto;
      padding: 8px 14px;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    #toggle-settings {
      width: 28px;
      height: 28px;
      padding: 0;
      font-size: 12px;
      transition: transform 0.2s, background 0.12s, border-color 0.12s;
    }
    #generate-controls.collapsed #toggle-settings {
      transform: rotate(-90deg);
    }
    #settings {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 1500px;
      overflow: hidden;
      transition: max-height 0.2s ease, opacity 0.2s ease, margin-top 0.2s ease;
    }
    #generate-controls.collapsed #settings {
      max-height: 0;
      opacity: 0;
      margin-top: 0;
      pointer-events: none;
    }
    .setting { display: flex; flex-direction: column; gap: 4px; }
    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(180, 190, 210, 0.55);
    }
    .setting-value { color: #d4ff5f; }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #d4ff5f;
      cursor: pointer;
      border: none;
    }
    input[type="range"]::-moz-range-thumb {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #d4ff5f;
      cursor: pointer;
      border: none;
    }
    input[type="range"]:disabled { opacity: 0.6; cursor: not-allowed; }
    input[type="range"]:disabled::-webkit-slider-thumb {
      background: rgba(212, 255, 95, 0.4);
      cursor: not-allowed;
    }
    input[type="range"]:disabled::-moz-range-thumb {
      background: rgba(212, 255, 95, 0.4);
      cursor: not-allowed;
    }

    #controls {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex; gap: 14px;
      padding: 14px 16px;
      background: rgba(15, 17, 28, 0.6);
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .pad {
      display: grid;
      grid-template-columns: repeat(3, 40px);
      grid-template-rows: repeat(2, 40px);
      gap: 4px;
    }
    .pad .label {
      grid-column: 1 / -1;
      text-align: center;
      color: rgba(180, 190, 210, 0.55);
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 2px;
      line-height: 1;
    }
    .pad.move { grid-template-areas: "label label label" ". up ." "left down right"; }
    .pad.rot  { grid-template-areas: "label label label" ". up ." "left down right"; }
    .pad.zoom { grid-template-columns: 40px; grid-template-areas: "label" "up" "down"; }
    .pad.elevate { grid-template-columns: 40px; grid-template-areas: "label" "up" "down"; }
    .pad.move .label, .pad.rot .label, .pad.zoom .label, .pad.elevate .label { grid-area: label; }

    button {
      width: 40px; height: 40px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.04);
      color: rgba(220, 225, 240, 0.9);
      font-family: inherit;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: background 0.12s, border-color 0.12s, transform 0.08s;
      display: flex; align-items: center; justify-content: center;
      padding: 0;
    }
    button:hover {
      background: rgba(212, 255, 95, 0.08);
      border-color: rgba(212, 255, 95, 0.2);
    }
    button.active, button:active {
      background: rgba(212, 255, 95, 0.18);
      border-color: rgba(212, 255, 95, 0.4);
      color: #d4ff5f;
      transform: scale(0.94);
    }

    .pad.move [data-action="move-fwd"]   { grid-area: up; }
    .pad.move [data-action="move-back"]  { grid-area: down; }
    .pad.move [data-action="move-left"]  { grid-area: left; }
    .pad.move [data-action="move-right"] { grid-area: right; }
    .pad.rot  [data-action="rot-up"]     { grid-area: up; }
    .pad.rot  [data-action="rot-down"]   { grid-area: down; }
    .pad.rot  [data-action="rot-left"]   { grid-area: left; }
    .pad.rot  [data-action="rot-right"]  { grid-area: right; }
    .pad.zoom [data-action="zoom-in"]    { grid-area: up; }
    .pad.zoom [data-action="zoom-out"]   { grid-area: down; }
    .pad.elevate [data-action="elev-up"]   { grid-area: up; }
    .pad.elevate [data-action="elev-down"] { grid-area: down; }

    .divider {
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.08) 30%, rgba(255,255,255,0.08) 70%, transparent);
      margin: 0 -4px;
    }

    @media (max-width: 480px) {
      #controls { gap: 8px; padding: 10px 12px; }
      .pad { grid-template-columns: repeat(3, 36px); grid-template-rows: repeat(2, 36px); }
      button { width: 36px; height: 36px; font-size: 14px; }
    }
  </style>
</head>
<body>
  <div id="stage"></div>

  <div id="info">
    <div class="title">Cityscape · v0.22</div>
    <div>drag · pinch · pan · elevate</div>
    <div id="debug" style="margin-top:6px;color:rgba(212,255,95,0.75);font-size:10px;letter-spacing:0.05em;">cam —</div>
  </div>

  <div id="generate-controls" class="collapsed">
    <div class="header">
      <button id="generate-btn">Generate</button>
      <button id="toggle-settings" aria-label="Toggle settings">▾</button>
    </div>
    <div id="settings">
      <div class="setting">
        <div class="setting-row">
          <span>Buildings</span>
          <span class="setting-value" id="val-total">1000</span>
        </div>
        <input type="range" id="slider-total" min="1" max="1000" value="1000">
      </div>
      <div class="setting">
        <div class="setting-row">
          <span>Skyscrapers</span>
          <span class="setting-value" id="val-sky">5%</span>
        </div>
        <input type="range" id="slider-sky" min="0" max="100" value="5">
      </div>
      <div class="setting">
        <div class="setting-row">
          <span>Tall</span>
          <span class="setting-value" id="val-tall">17%</span>
        </div>
        <input type="range" id="slider-tall" min="0" max="100" value="17">
      </div>
      <div class="setting">
        <div class="setting-row">
          <span>Medium</span>
          <span class="setting-value" id="val-med">45%</span>
        </div>
        <input type="range" id="slider-med" min="0" max="100" value="45">
      </div>
      <div class="setting">
        <div class="setting-row">
          <span>Small</span>
          <span class="setting-value" id="val-small">33%</span>
        </div>
        <input type="range" id="slider-small" min="0" max="100" value="33" disabled>
      </div>
    </div>
  </div>

  <div id="controls">
    <div class="pad move">
      <div class="label">Move</div>
      <button data-action="move-fwd" aria-label="Move forward">↑</button>
      <button data-action="move-left" aria-label="Move left">←</button>
      <button data-action="move-back" aria-label="Move back">↓</button>
      <button data-action="move-right" aria-label="Move right">→</button>
    </div>
    <div class="divider"></div>
    <div class="pad rot">
      <div class="label">Rotate</div>
      <button data-action="rot-up" aria-label="Tilt up">⌃</button>
      <button data-action="rot-left" aria-label="Rotate left">↺</button>
      <button data-action="rot-down" aria-label="Tilt down">⌄</button>
      <button data-action="rot-right" aria-label="Rotate right">↻</button>
    </div>
    <div class="divider"></div>
    <div class="pad elevate">
      <div class="label">Elev</div>
      <button data-action="elev-up" aria-label="Elevate up">▲</button>
      <button data-action="elev-down" aria-label="Elevate down">▼</button>
    </div>
    <div class="divider"></div>
    <div class="pad zoom">
      <div class="label">Zoom</div>
      <button data-action="zoom-in" aria-label="Zoom in">+</button>
      <button data-action="zoom-out" aria-label="Zoom out">−</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.166.1/three.module.min.js';

    // ─── Renderer ───────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.getElementById('stage').appendChild(renderer.domElement);
    const canvas = renderer.domElement;

    // ─── Scene ──────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xde5b68);
    scene.fog = new THREE.Fog(0x873a42, 400, 1000);

    // ─── Camera ─────────────────────────────────────────────────────────
    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(250, 175, 250);
    const target = new THREE.Vector3(0, 0, 0);
    camera.lookAt(target);

    const MIN_DISTANCE = 2;
    const MAX_DISTANCE = 700;
    const MAX_POLAR    = Math.PI * 0.49;
    const MIN_POLAR    = 0.05;

    // ─── Ground ─────────────────────────────────────────────────────────
    const ground = new THREE.Mesh(
      new THREE.CylinderGeometry(800, 800, 1, 96),
      new THREE.MeshStandardMaterial({ color: 0x54163d })
    );
    ground.position.y = -0.5;
    scene.add(ground);

    // ─── Lighting ───────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 0.45));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
    dirLight.position.set(30, 50, 20);
    scene.add(dirLight);

    // ─── City ───────────────────────────────────────────────────────────
    const cityGroup = new THREE.Group();
    scene.add(cityGroup);
    const BUILDING_MATERIAL = new THREE.MeshStandardMaterial({ color: 0xed2651 });

    const sliderTotal = document.getElementById('slider-total');
    const sliderSky   = document.getElementById('slider-sky');
    const sliderTall  = document.getElementById('slider-tall');
    const sliderMed   = document.getElementById('slider-med');
    const sliderSmall = document.getElementById('slider-small');
    const valTotal = document.getElementById('val-total');
    const valSky   = document.getElementById('val-sky');
    const valTall  = document.getElementById('val-tall');
    const valMed   = document.getElementById('val-med');
    const valSmall = document.getElementById('val-small');

    function refreshSettingsDisplay() {
      const sky  = +sliderSky.value;
      const tall = +sliderTall.value;
      const med  = +sliderMed.value;
      const small = Math.max(0, 100 - sky - tall - med);
      sliderSmall.value = small;
      valTotal.textContent = sliderTotal.value;
      valSky.textContent   = sky + '%';
      valTall.textContent  = tall + '%';
      valMed.textContent   = med + '%';
      valSmall.textContent = small + '%';
    }

    // When `moved` changes, scale the other two percentage sliders down proportionally
    // so the three sum to ≤ 100. Small is auto-computed in refreshSettingsDisplay.
    function clampOthers(moved, others) {
      const otherVals = others.map(s => +s.value);
      const otherSum = otherVals.reduce((a, b) => a + b, 0);
      const avail = 100 - +moved.value;
      if (otherSum > avail) {
        const scale = otherSum > 0 ? avail / otherSum : 0;
        others.forEach((s, i) => { s.value = Math.round(otherVals[i] * scale); });
      }
    }

    sliderTotal.addEventListener('input', refreshSettingsDisplay);
    sliderSky.addEventListener('input', () => {
      clampOthers(sliderSky, [sliderTall, sliderMed]);
      refreshSettingsDisplay();
    });
    sliderTall.addEventListener('input', () => {
      clampOthers(sliderTall, [sliderSky, sliderMed]);
      refreshSettingsDisplay();
    });
    sliderMed.addEventListener('input', () => {
      clampOthers(sliderMed, [sliderSky, sliderTall]);
      refreshSettingsDisplay();
    });

    document.getElementById('toggle-settings').addEventListener('click', () => {
      document.getElementById('generate-controls').classList.toggle('collapsed');
    });

    function generateCity() {
      cityGroup.traverse(o => { if (o.geometry) o.geometry.dispose(); });
      cityGroup.clear();

      const total   = +sliderTotal.value;
      const skyPct  = +sliderSky.value / 100;
      const tallPct = +sliderTall.value / 100;
      const medPct  = +sliderMed.value / 100;

      const CELL = 8, ROAD = 3, ROAD_JITTER = 1.6;
      // Oversize the grid so multi-cell footprints fit and some lots stay empty.
      const cellsTarget = Math.max(4, total * 2.2);
      const COLS = Math.ceil(Math.sqrt(cellsTarget));
      const ROWS = Math.ceil(cellsTarget / COLS);

      // Per-row/col positions with jittered road widths.
      const xEdges = [0];
      for (let i = 1; i < COLS; i++) {
        const roadW = ROAD + (Math.random() - 0.5) * 2 * ROAD_JITTER;
        xEdges.push(xEdges[i - 1] + CELL + roadW);
      }
      const zEdges = [0];
      for (let j = 1; j < ROWS; j++) {
        const roadD = ROAD + (Math.random() - 0.5) * 2 * ROAD_JITTER;
        zEdges.push(zEdges[j - 1] + CELL + roadD);
      }
      const totalW = xEdges[COLS - 1] + CELL;
      const totalD = zEdges[ROWS - 1] + CELL;
      const offX = -totalW / 2;
      const offZ = -totalD / 2;

      const occupied = Array.from({ length: COLS }, () => new Array(ROWS).fill(false));
      const fits = (i, j, w, h) => {
        if (i + w > COLS || j + h > ROWS) return false;
        for (let a = i; a < i + w; a++) for (let b = j; b < j + h; b++) if (occupied[a][b]) return false;
        return true;
      };

      function pickFootprint() {
        const r = Math.random();
        if (r < 0.15) return [2, 2];        // 15% 2x2
        if (r < 0.30) return [2, 1];        // 15% 2x1
        if (r < 0.45) return [1, 2];        // 15% 1x2
        return [1, 1];                      // 55% 1x1
      }

      // Random cell order so multi-cell footprints land throughout the grid.
      const cells = [];
      for (let i = 0; i < COLS; i++) for (let j = 0; j < ROWS; j++) cells.push([i, j]);
      for (let k = cells.length - 1; k > 0; k--) {
        const m = Math.floor(Math.random() * (k + 1));
        [cells[k], cells[m]] = [cells[m], cells[k]];
      }

      let placed = 0;
      for (const [i, j] of cells) {
        if (placed >= total) break;
        if (occupied[i][j]) continue;

        let [w, h] = pickFootprint();
        if (!fits(i, j, w, h)) {
          const fallbacks = [[2, 1], [1, 2], [1, 1]];
          const choice = fallbacks.find(([fw, fh]) => fits(i, j, fw, fh));
          if (!choice) continue;
          [w, h] = choice;
        }
        for (let a = i; a < i + w; a++) for (let b = j; b < j + h; b++) occupied[a][b] = true;

        const r = Math.random();
        let height;
        if (r < skyPct)                                  height = (25 + Math.random() * 15) * 2;    // skyscraper (ultra)
        else if (r < skyPct + tallPct)                   height = 25 + Math.random() * 15;          // tall
        else if (r < skyPct + tallPct + medPct)          height = 8  + Math.random() * 7;           // medium
        else                                              height = 3  + Math.random() * 4;           // small

        const leftX   = xEdges[i];
        const rightX  = xEdges[i + w - 1] + CELL;
        const topZ    = zEdges[j];
        const bottomZ = zEdges[j + h - 1] + CELL;

        // Bigger footprints fill more of their lot; smaller ones get more variable padding.
        const fillMin = (w * h === 1) ? 0.55 : 0.78;
        const fillRange = (w * h === 1) ? 0.35 : 0.18;
        const fpW = fillMin + Math.random() * fillRange;
        const fpD = fillMin + Math.random() * fillRange;

        const buildingW = (rightX - leftX) * fpW;
        const buildingD = (bottomZ - topZ) * fpD;
        const centerX = (leftX + rightX) / 2 + offX;
        const centerZ = (topZ + bottomZ) / 2 + offZ;

        const geo = new THREE.BoxGeometry(buildingW, height, buildingD);
        const mesh = new THREE.Mesh(geo, BUILDING_MATERIAL);
        mesh.position.set(centerX, height / 2, centerZ);
        cityGroup.add(mesh);
        placed++;
      }
    }

    document.getElementById('generate-btn').addEventListener('click', generateCity);
    refreshSettingsDisplay();
    generateCity();

    // ─── Camera math ────────────────────────────────────────────────────
    const _forward = new THREE.Vector3();
    const _right   = new THREE.Vector3();
    const _offset  = new THREE.Vector3();
    const _spherical = new THREE.Spherical();

    function orbit(yaw, pitch) {
      _offset.subVectors(camera.position, target);
      _spherical.setFromVector3(_offset);
      _spherical.theta -= yaw;
      _spherical.phi   -= pitch;
      _spherical.phi = Math.max(MIN_POLAR, Math.min(MAX_POLAR, _spherical.phi));
      _offset.setFromSpherical(_spherical);
      camera.position.copy(target).add(_offset);
      camera.lookAt(target);
    }

    function zoom(factor) {
      _offset.subVectors(camera.position, target).multiplyScalar(factor);
      const d = _offset.length();
      if (d > MIN_DISTANCE && d < MAX_DISTANCE) {
        camera.position.copy(target).add(_offset);
      }
    }

    function pan(dx, dy) {
      camera.getWorldDirection(_forward);
      _forward.y = 0;
      _forward.normalize();
      _right.crossVectors(_forward, camera.up).normalize();
      const move = new THREE.Vector3()
        .addScaledVector(_right, dx)
        .addScaledVector(_forward, dy);
      camera.position.add(move);
      target.add(move);
    }

    const MIN_Y = 1;
    const MAX_Y = 200;
    function elevate(dy) {
      const clamped = Math.max(MIN_Y, Math.min(MAX_Y, camera.position.y + dy));
      const actual = clamped - camera.position.y;
      camera.position.y += actual;
      target.y += actual;
    }

    // ─── Button input ───────────────────────────────────────────────────
    const MOVE_SPEED   = 0.4;
    const ROTATE_SPEED = 0.025;
    const ZOOM_FACTOR  = 1.04;
    const ELEV_SPEED   = 0.4;
    const activeActions = new Set();

    function applyAction(action) {
      switch (action) {
        case 'move-fwd':   pan(0,  MOVE_SPEED); break;
        case 'move-back':  pan(0, -MOVE_SPEED); break;
        case 'move-right': pan( MOVE_SPEED, 0); break;
        case 'move-left':  pan(-MOVE_SPEED, 0); break;
        case 'rot-left':   orbit(+ROTATE_SPEED, 0); break;
        case 'rot-right':  orbit(-ROTATE_SPEED, 0); break;
        case 'rot-up':     orbit(0, +ROTATE_SPEED); break;
        case 'rot-down':   orbit(0, -ROTATE_SPEED); break;
        case 'zoom-in':    zoom(1 / ZOOM_FACTOR); break;
        case 'zoom-out':   zoom(ZOOM_FACTOR); break;
        case 'elev-up':    elevate( ELEV_SPEED); break;
        case 'elev-down':  elevate(-ELEV_SPEED); break;
      }
    }

    document.querySelectorAll('#controls button').forEach(btn => {
      const action = btn.dataset.action;
      const start = (e) => { e.preventDefault(); activeActions.add(action); btn.classList.add('active'); };
      const end   = (e) => { e.preventDefault(); activeActions.delete(action); btn.classList.remove('active'); };
      btn.addEventListener('pointerdown', start);
      btn.addEventListener('pointerup', end);
      btn.addEventListener('pointerleave', end);
      btn.addEventListener('pointercancel', end);
    });

    // ─── Canvas pointer / pinch ─────────────────────────────────────────
    const pointers = new Map();
    let lastPinchDist = 0;
    let lastCentroid = null;
    const DRAG_SENSITIVITY = 0.006;
    const PAN_SENSITIVITY  = 0.0015; // scaled by camera distance for natural feel

    canvas.addEventListener('pointerdown', (e) => {
      canvas.setPointerCapture(e.pointerId);
      pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (pointers.size === 2) {
        const [p1, p2] = [...pointers.values()];
        lastPinchDist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
        lastCentroid  = { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 };
      }
    });

    canvas.addEventListener('pointermove', (e) => {
      if (!pointers.has(e.pointerId)) return;
      const prev = pointers.get(e.pointerId);
      const dx = e.clientX - prev.x;
      const dy = e.clientY - prev.y;
      pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

      if (pointers.size === 1) {
        // single-finger drag = orbit
        orbit(dx * DRAG_SENSITIVITY, dy * DRAG_SENSITIVITY);
      } else if (pointers.size === 2) {
        const [p1, p2] = [...pointers.values()];
        const cx   = (p1.x + p2.x) / 2;
        const cy   = (p1.y + p2.y) / 2;
        const dist = Math.hypot(p2.x - p1.x, p2.y - p1.y);

        // two-finger drag = pan (based on centroid movement)
        if (lastCentroid) {
          const camDist = camera.position.distanceTo(target);
          const scale = camDist * PAN_SENSITIVITY;
          pan(-(cx - lastCentroid.x) * scale, -(cy - lastCentroid.y) * scale);
        }
        // pinch = zoom (based on finger distance change)
        if (lastPinchDist > 0) zoom(lastPinchDist / dist);

        lastCentroid  = { x: cx, y: cy };
        lastPinchDist = dist;
      }
    });

    function endPointer(e) {
      pointers.delete(e.pointerId);
      if (pointers.size < 2) {
        lastPinchDist = 0;
        lastCentroid  = null;
      }
    }
    canvas.addEventListener('pointerup', endPointer);
    canvas.addEventListener('pointercancel', endPointer);
    canvas.addEventListener('pointerleave', endPointer);

    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      zoom(e.deltaY > 0 ? ZOOM_FACTOR : 1 / ZOOM_FACTOR);
    }, { passive: false });

    // ─── Resize ─────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ─── Loop ───────────────────────────────────────────────────────────
    const debugEl = document.getElementById('debug');
    function tick() {
      requestAnimationFrame(tick);
      activeActions.forEach(applyAction);
      const p = camera.position;
      debugEl.textContent =
        `cam ${p.x.toFixed(1)}, ${p.y.toFixed(1)}, ${p.z.toFixed(1)}` +
        (activeActions.size ? `  •  ${[...activeActions].join(',')}` : '');
      renderer.render(scene, camera);
    }
    tick();
  </script>
</body>
</html>
