<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Cityscape Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #0a0a14;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
    }
    #stage { position: fixed; inset: 0; }
    canvas { display: block; width: 100%; height: 100%; touch-action: none; }

    #info {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 16px);
      left: calc(env(safe-area-inset-left, 0px) + 16px);
      z-index: 10;
      padding: 10px 14px;
      background: rgba(15, 17, 28, 0.55);
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      color: rgba(220, 225, 240, 0.85);
      font-size: 11px;
      letter-spacing: 0.04em;
      line-height: 1.5;
    }
    #info .title {
      color: #d4ff5f;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 10px;
      margin-bottom: 2px;
    }

    #generate-controls {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 16px);
      right: calc(env(safe-area-inset-right, 0px) + 16px);
      z-index: 10;
      padding: 10px 14px;
      background: rgba(15, 17, 28, 0.55);
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
    }
    #generate-btn {
      width: auto;
      height: auto;
      padding: 8px 14px;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    #controls {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex; gap: 14px;
      padding: 14px 16px;
      background: rgba(15, 17, 28, 0.6);
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .pad {
      display: grid;
      grid-template-columns: repeat(3, 40px);
      grid-template-rows: repeat(2, 40px);
      gap: 4px;
    }
    .pad .label {
      grid-column: 1 / -1;
      text-align: center;
      color: rgba(180, 190, 210, 0.55);
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 2px;
      line-height: 1;
    }
    .pad.move { grid-template-areas: "label label label" ". up ." "left down right"; }
    .pad.rot  { grid-template-areas: "label label label" ". up ." "left down right"; }
    .pad.zoom { grid-template-columns: 40px; grid-template-areas: "label" "up" "down"; }
    .pad.elevate { grid-template-columns: 40px; grid-template-areas: "label" "up" "down"; }
    .pad.move .label, .pad.rot .label, .pad.zoom .label, .pad.elevate .label { grid-area: label; }

    button {
      width: 40px; height: 40px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.04);
      color: rgba(220, 225, 240, 0.9);
      font-family: inherit;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: background 0.12s, border-color 0.12s, transform 0.08s;
      display: flex; align-items: center; justify-content: center;
      padding: 0;
    }
    button:hover {
      background: rgba(212, 255, 95, 0.08);
      border-color: rgba(212, 255, 95, 0.2);
    }
    button.active, button:active {
      background: rgba(212, 255, 95, 0.18);
      border-color: rgba(212, 255, 95, 0.4);
      color: #d4ff5f;
      transform: scale(0.94);
    }

    .pad.move [data-action="move-fwd"]   { grid-area: up; }
    .pad.move [data-action="move-back"]  { grid-area: down; }
    .pad.move [data-action="move-left"]  { grid-area: left; }
    .pad.move [data-action="move-right"] { grid-area: right; }
    .pad.rot  [data-action="rot-up"]     { grid-area: up; }
    .pad.rot  [data-action="rot-down"]   { grid-area: down; }
    .pad.rot  [data-action="rot-left"]   { grid-area: left; }
    .pad.rot  [data-action="rot-right"]  { grid-area: right; }
    .pad.zoom [data-action="zoom-in"]    { grid-area: up; }
    .pad.zoom [data-action="zoom-out"]   { grid-area: down; }
    .pad.elevate [data-action="elev-up"]   { grid-area: up; }
    .pad.elevate [data-action="elev-down"] { grid-area: down; }

    .divider {
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.08) 30%, rgba(255,255,255,0.08) 70%, transparent);
      margin: 0 -4px;
    }

    @media (max-width: 480px) {
      #controls { gap: 8px; padding: 10px 12px; }
      .pad { grid-template-columns: repeat(3, 36px); grid-template-rows: repeat(2, 36px); }
      button { width: 36px; height: 36px; font-size: 14px; }
    }
  </style>
</head>
<body>
  <div id="stage"></div>

  <div id="info">
    <div class="title">Cityscape · v0.6</div>
    <div>drag · pinch · pan · elevate</div>
    <div id="debug" style="margin-top:6px;color:rgba(212,255,95,0.75);font-size:10px;letter-spacing:0.05em;">cam —</div>
  </div>

  <div id="generate-controls">
    <button id="generate-btn">Generate</button>
  </div>

  <div id="controls">
    <div class="pad move">
      <div class="label">Move</div>
      <button data-action="move-fwd" aria-label="Move forward">↑</button>
      <button data-action="move-left" aria-label="Move left">←</button>
      <button data-action="move-back" aria-label="Move back">↓</button>
      <button data-action="move-right" aria-label="Move right">→</button>
    </div>
    <div class="divider"></div>
    <div class="pad rot">
      <div class="label">Rotate</div>
      <button data-action="rot-up" aria-label="Tilt up">⌃</button>
      <button data-action="rot-left" aria-label="Rotate left">↺</button>
      <button data-action="rot-down" aria-label="Tilt down">⌄</button>
      <button data-action="rot-right" aria-label="Rotate right">↻</button>
    </div>
    <div class="divider"></div>
    <div class="pad elevate">
      <div class="label">Elev</div>
      <button data-action="elev-up" aria-label="Elevate up">▲</button>
      <button data-action="elev-down" aria-label="Elevate down">▼</button>
    </div>
    <div class="divider"></div>
    <div class="pad zoom">
      <div class="label">Zoom</div>
      <button data-action="zoom-in" aria-label="Zoom in">+</button>
      <button data-action="zoom-out" aria-label="Zoom out">−</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.166.1/three.module.min.js';

    // ─── Renderer ───────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.getElementById('stage').appendChild(renderer.domElement);
    const canvas = renderer.domElement;

    // ─── Scene ──────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a14);
    scene.fog = new THREE.Fog(0x0a0a14, 80, 250);

    // ─── Camera ─────────────────────────────────────────────────────────
    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(50, 38, 50);
    const target = new THREE.Vector3(0, 0, 0);
    camera.lookAt(target);

    const MIN_DISTANCE = 2;
    const MAX_DISTANCE = 200;
    const MAX_POLAR    = Math.PI * 0.49;
    const MIN_POLAR    = 0.05;

    // ─── Reference helpers ──────────────────────────────────────────────
    const grid = new THREE.GridHelper(100, 50, 0x3a3a5a, 0x1f1f33);
    scene.add(grid);
    const axes = new THREE.AxesHelper(4);
    axes.position.y = 0.01;
    scene.add(axes);

    // ─── Lighting ───────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 0.45));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
    dirLight.position.set(30, 50, 20);
    scene.add(dirLight);

    // ─── City ───────────────────────────────────────────────────────────
    const cityGroup = new THREE.Group();
    scene.add(cityGroup);
    const BUILDING_MATERIAL = new THREE.MeshStandardMaterial({ color: 0xffffff });

    function generateCity() {
      cityGroup.traverse(o => { if (o.geometry) o.geometry.dispose(); });
      cityGroup.clear();

      const COLS = 5, ROWS = 4;
      const CELL = 8, ROAD = 3;
      const totalW = COLS * CELL + (COLS - 1) * ROAD;
      const totalD = ROWS * CELL + (ROWS - 1) * ROAD;

      for (let i = 0; i < COLS; i++) {
        for (let j = 0; j < ROWS; j++) {
          const r = Math.random();
          let height;
          if (r < 0.2)      height = 25 + Math.random() * 15; // 20% skyscrapers
          else if (r < 0.7) height = 8  + Math.random() * 7;  // 50% medium / warehouse
          else              height = 3  + Math.random() * 4;  // 30% small

          const fp = 0.55 + Math.random() * 0.35;
          const w = CELL * fp;
          const d = CELL * fp;

          const geo = new THREE.BoxGeometry(w, height, d);
          const mesh = new THREE.Mesh(geo, BUILDING_MATERIAL);
          const x = -totalW / 2 + CELL / 2 + i * (CELL + ROAD);
          const z = -totalD / 2 + CELL / 2 + j * (CELL + ROAD);
          mesh.position.set(x, height / 2, z);
          cityGroup.add(mesh);
        }
      }
    }

    document.getElementById('generate-btn').addEventListener('click', generateCity);
    generateCity();

    // ─── Camera math ────────────────────────────────────────────────────
    const _forward = new THREE.Vector3();
    const _right   = new THREE.Vector3();
    const _offset  = new THREE.Vector3();
    const _spherical = new THREE.Spherical();

    function orbit(yaw, pitch) {
      _offset.subVectors(camera.position, target);
      _spherical.setFromVector3(_offset);
      _spherical.theta -= yaw;
      _spherical.phi   -= pitch;
      _spherical.phi = Math.max(MIN_POLAR, Math.min(MAX_POLAR, _spherical.phi));
      _offset.setFromSpherical(_spherical);
      camera.position.copy(target).add(_offset);
      camera.lookAt(target);
    }

    function zoom(factor) {
      _offset.subVectors(camera.position, target).multiplyScalar(factor);
      const d = _offset.length();
      if (d > MIN_DISTANCE && d < MAX_DISTANCE) {
        camera.position.copy(target).add(_offset);
      }
    }

    function pan(dx, dy) {
      camera.getWorldDirection(_forward);
      _forward.y = 0;
      _forward.normalize();
      _right.crossVectors(_forward, camera.up).normalize();
      const move = new THREE.Vector3()
        .addScaledVector(_right, dx)
        .addScaledVector(_forward, dy);
      camera.position.add(move);
      target.add(move);
    }

    function elevate(dy) {
      camera.position.y += dy;
      target.y += dy;
    }

    // ─── Button input ───────────────────────────────────────────────────
    const MOVE_SPEED   = 0.4;
    const ROTATE_SPEED = 0.025;
    const ZOOM_FACTOR  = 1.04;
    const ELEV_SPEED   = 0.4;
    const activeActions = new Set();

    function applyAction(action) {
      switch (action) {
        case 'move-fwd':   pan(0,  MOVE_SPEED); break;
        case 'move-back':  pan(0, -MOVE_SPEED); break;
        case 'move-right': pan( MOVE_SPEED, 0); break;
        case 'move-left':  pan(-MOVE_SPEED, 0); break;
        case 'rot-left':   orbit(+ROTATE_SPEED, 0); break;
        case 'rot-right':  orbit(-ROTATE_SPEED, 0); break;
        case 'rot-up':     orbit(0, +ROTATE_SPEED); break;
        case 'rot-down':   orbit(0, -ROTATE_SPEED); break;
        case 'zoom-in':    zoom(1 / ZOOM_FACTOR); break;
        case 'zoom-out':   zoom(ZOOM_FACTOR); break;
        case 'elev-up':    elevate( ELEV_SPEED); break;
        case 'elev-down':  elevate(-ELEV_SPEED); break;
      }
    }

    document.querySelectorAll('#controls button').forEach(btn => {
      const action = btn.dataset.action;
      const start = (e) => { e.preventDefault(); activeActions.add(action); btn.classList.add('active'); };
      const end   = (e) => { e.preventDefault(); activeActions.delete(action); btn.classList.remove('active'); };
      btn.addEventListener('pointerdown', start);
      btn.addEventListener('pointerup', end);
      btn.addEventListener('pointerleave', end);
      btn.addEventListener('pointercancel', end);
    });

    // ─── Canvas pointer / pinch ─────────────────────────────────────────
    const pointers = new Map();
    let lastPinchDist = 0;
    let lastCentroid = null;
    const DRAG_SENSITIVITY = 0.006;
    const PAN_SENSITIVITY  = 0.0015; // scaled by camera distance for natural feel

    canvas.addEventListener('pointerdown', (e) => {
      canvas.setPointerCapture(e.pointerId);
      pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (pointers.size === 2) {
        const [p1, p2] = [...pointers.values()];
        lastPinchDist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
        lastCentroid  = { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 };
      }
    });

    canvas.addEventListener('pointermove', (e) => {
      if (!pointers.has(e.pointerId)) return;
      const prev = pointers.get(e.pointerId);
      const dx = e.clientX - prev.x;
      const dy = e.clientY - prev.y;
      pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

      if (pointers.size === 1) {
        // single-finger drag = orbit
        orbit(dx * DRAG_SENSITIVITY, dy * DRAG_SENSITIVITY);
      } else if (pointers.size === 2) {
        const [p1, p2] = [...pointers.values()];
        const cx   = (p1.x + p2.x) / 2;
        const cy   = (p1.y + p2.y) / 2;
        const dist = Math.hypot(p2.x - p1.x, p2.y - p1.y);

        // two-finger drag = pan (based on centroid movement)
        if (lastCentroid) {
          const camDist = camera.position.distanceTo(target);
          const scale = camDist * PAN_SENSITIVITY;
          pan(-(cx - lastCentroid.x) * scale, -(cy - lastCentroid.y) * scale);
        }
        // pinch = zoom (based on finger distance change)
        if (lastPinchDist > 0) zoom(lastPinchDist / dist);

        lastCentroid  = { x: cx, y: cy };
        lastPinchDist = dist;
      }
    });

    function endPointer(e) {
      pointers.delete(e.pointerId);
      if (pointers.size < 2) {
        lastPinchDist = 0;
        lastCentroid  = null;
      }
    }
    canvas.addEventListener('pointerup', endPointer);
    canvas.addEventListener('pointercancel', endPointer);
    canvas.addEventListener('pointerleave', endPointer);

    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      zoom(e.deltaY > 0 ? ZOOM_FACTOR : 1 / ZOOM_FACTOR);
    }, { passive: false });

    // ─── Resize ─────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ─── Loop ───────────────────────────────────────────────────────────
    const debugEl = document.getElementById('debug');
    function tick() {
      requestAnimationFrame(tick);
      activeActions.forEach(applyAction);
      const p = camera.position;
      debugEl.textContent =
        `cam ${p.x.toFixed(1)}, ${p.y.toFixed(1)}, ${p.z.toFixed(1)}` +
        (activeActions.size ? `  •  ${[...activeActions].join(',')}` : '');
      renderer.render(scene, camera);
    }
    tick();
  </script>
</body>
</html>
